<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Facts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: CanvasText;
            background-color: Canvas;
            color-scheme: light dark;
        }
        h1 {
            padding: 10px;
            text-align: center;
            margin: 0 0 20px;
            font-size: 600%;
        }
        #answersContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .ansBTN {
            padding: 10px 20px;
            font-size: 24px;
            cursor: pointer;
            background-color: Field;
            color: CanvasText;
            border: 2px solid currentColor;
            border-radius: 15%;
        }
        .ansBTN:hover {
            background-color: Highlight;
            color: HighlightText;
        }
        .ansBTN:active {
            background-color: HighlightText;
            color: Highlight;
        }
        #questions {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
            height: 60px;
        }
        #currentAnswer {
            text-align: center;
            font-size: 24px;
            margin: 20px;
        }
        .controls {
            text-align: center;
            margin: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>MATH FACTS <span><b>WE</b></span></h1>
    <div id="questions"></div>
    <div id="currentAnswer"></div>
    <div id="answersContainer">
        <button onclick="appendDigit('1')" class="ansBTN">1</button>
        <button onclick="appendDigit('2')" class="ansBTN">2</button>
        <button onclick="appendDigit('3')" class="ansBTN">3</button>
        <button onclick="appendDigit('4')" class="ansBTN">4</button>
        <button onclick="appendDigit('5')" class="ansBTN">5</button>
        <button onclick="appendDigit('6')" class="ansBTN">6</button>
        <button onclick="appendDigit('7')" class="ansBTN">7</button>
        <button onclick="appendDigit('8')" class="ansBTN">8</button>
        <button onclick="appendDigit('9')" class="ansBTN">9</button>
        <button onclick="appendDigit('0')" class="ansBTN">0</button>
    </div>
    <div class="controls">
        <button onclick="checkAnswer()" class="ansBTN">Submit</button>
        <button onclick="clearAnswer()" class="ansBTN">Clear</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
